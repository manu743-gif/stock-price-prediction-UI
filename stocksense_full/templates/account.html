{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">Account</h1><p class="page-sub">Manage your profile</p></div>
<div class="card" style="max-width:480px">
  <div class="card-title">Profile</div>
  {% if message %}<div class="success-msg">{{ message }}</div>{% endif %}
  <form method="POST" action="/account">
    <div class="form-field"><label>Full name</label><input type="text" name="full_name" value="{{ user_obj.full_name }}" required/></div>
    <div class="form-field"><label>Email</label><input type="email" value="{{ user_obj.email }}" disabled style="opacity:0.6;cursor:not-allowed"/></div>
    <div class="form-field"><label>Plan</label><input type="text" value="{{ user_obj.plan }}" disabled style="opacity:0.6;cursor:not-allowed"/></div>
    <button type="submit" class="btn btn-primary">Save changes</button>
  </form>
</div>
{% endblock %}
