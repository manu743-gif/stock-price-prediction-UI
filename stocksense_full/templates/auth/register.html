<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StockSense — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="logo-icon">S</div><span class="logo-text">StockSense</span></div>
    <h2>Create account</h2>
    <p class="auth-sub">Start predicting stock prices with AI</p>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST" action="/register">
      <div class="form-field"><label>Full name</label><input type="text" name="full_name" placeholder="Your name" required/></div>
      <div class="form-field"><label>Email</label><input type="email" name="email" placeholder="you@example.com" required/></div>
      <div class="form-field"><label>Password</label><input type="password" name="password" placeholder="Min 8 characters" required minlength="8"/></div>
      <button type="submit" class="btn-auth">Create account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
</body>
</html>
